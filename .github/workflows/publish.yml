name: Publish to npm

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install root dependencies
        run: npm install

      - name: Install CLI dependencies
        run: npm install
        working-directory: cli

      - name: Bump patch version
        run: |
          CURRENT=$(npm view projectlens version 2>/dev/null || echo "0.0.0")
          npm version "$CURRENT" --no-git-tag-version --allow-same-version
          npm version patch --no-git-tag-version
        working-directory: cli

      - name: Read new version
        id: version
        run: echo "value=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
        working-directory: cli

      - name: Build
        run: npm run build
        working-directory: cli

      - name: Publish to npm
        run: npm publish
        working-directory: cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cli/package.json
          git commit -m "chore: release v${{ steps.version.outputs.value }}"
          git tag "v${{ steps.version.outputs.value }}"
          git push && git push --tags

      - name: Create GitHub Release
        run: gh release create "v${{ steps.version.outputs.value }}" --title "v${{ steps.version.outputs.value }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
